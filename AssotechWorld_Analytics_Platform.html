function CustomTooltip({ active, payload, label }) {

      ))}
    </div>
  );
}

function AnimatedCounter({value,duration=1200}) {
  const [display,setDisplay] = useState("0");
  const m = value?.match(/[\d.]+/);
  const numeric = m ? parseFloat(m[0]) : 0;
  const prefix = value?.replace(/[\d.]+.*/,"") || "";
  const suffix = value?.replace(/^[^0-9]*[\d.]+/,"") || "";
  useEffect(()=>{
    let start=0;
    const step=numeric/(duration/16);
    const timer=setInterval(()=>{
      start+=step;
      if(start>=numeric){setDisplay(value);clearInterval(timer);}
      else{
        const d=start>=1000?Math.round(start).toLocaleString():start.toFixed(numeric%1!==0?1:0);
        setDisplay(prefix+d+suffix);
      }
    },16);
    return()=>clearInterval(timer);
  },[value]);
  return <span>{display}</span>;
}

function SparkLine({data,color}) {
  return (

      <LineChart data={data}>
        <Line type="monotone" dataKey="v" stroke={color} strokeWidth={1.5} dot={false}/>
      </LineChart>
    </ResponsiveContainer>
  );
}

function GlassCard({children,style={},glow=false}) {
  const [h,setH]=useState(false);
  return (
    <div
      onMouseEnter={()=>setH(true)}
      onMouseLeave={()=>setH(false)}
      style={{
        background:h?C.bgCardHover:C.bgCard,
        border:`1px solid ${h?C.borderHover:C.border}`,
        borderRadius:16,
        backdropFilter:"blur(12px)",
        transition:"all 0.25s ease",
        boxShadow:glow&&h?`0 0 24px ${C.primary}22`:"none",
        ...style,
      }}
    >{children}</div>
  );
}

- Profit Margin: 34.6% | CAC: ₹2,340
- Forecasted Feb revenue: ₹8.9Cr (base case)

Respond as a sharp, data-driven AI analyst. Be concise, specific, and always include numbers and insights. Use ₹ for currency. Occasionally suggest actionable next steps. Keep responses under 4 sentences.`;

    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system:systemPrompt,
          messages:[
            ...messages.map(m=>({role:m.role==="ai"?"assistant":"user",content:m.text})),
            {role:"user",content:userMsg}
          ]
        })
      });
      const data = await resp.json();
      const reply = data.content?.[0]?.text || "I couldn't process that. Please try again.";
      setMessages(prev=>[...prev,{role:"ai",text:reply}]);
    } catch(err) {
      setError("Connection error. Please try again.");
    }
    setLoading(false);
  };

  return (
    <div style={{padding:28,height:"calc(100vh - 64px)",display:"flex",flexDirection:"column"}}>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:22,fontWeight:700,color:C.text,marginBottom:6}}>AI Analytics Copilot</div>
        <div style={{fontSize:13,color:C.muted}}>Ask anything about your business data · Powered by Claude</div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {quickPrompts.map((p,i)=>(
          <button key={i} onClick={()=>sendMessage(p)} style={{
            fontSize:11,padding:"6px 14px",borderRadius:20,cursor:"pointer",
            background:C.bgCard,border:`1px solid ${C.border}`,color:C.muted,
            transition:"all 0.15s",
          }}
            onMouseEnter={e=>{e.target.style.borderColor=C.primary;e.target.style.color=C.primary;}}
            onMouseLeave={e=>{e.target.style.borderColor=C.border;e.target.style.color=C.muted;}}
          >{p}</button>
        ))}
      </div>
      <GlassCard style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{flex:1,overflowY:"auto",padding:20}}>
          {messages.map((m,i)=>(
            <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:16}}>
              {m.role==="ai"&&(
                <div style={{width:28,height:28,borderRadius:"50%",background:`linear-gradient(135deg, ${C.primary}, ${C.secondary})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#000",marginRight:10,flexShrink:0,marginTop:2}}>✦</div>
              )}
              <div style={{
                maxWidth:"72%",padding:"12px 16px",
                borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",
                background:m.role==="user"?`${C.primary}22`:C.bgCardHover,
                border:`1px solid ${m.role==="user"?C.primary+"44":C.border}`,
                fontSize:13,color:C.text,lineHeight:1.6,
              }}>{m.text}</div>
            </div>
          ))}
          {loading&&(
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:`linear-gradient(135deg, ${C.primary}, ${C.secondary})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#000"}}>✦</div>
              <div style={{padding:"12px 16px",borderRadius:"16px 16px 16px 4px",background:C.bgCardHover,border:`1px solid ${C.border}`}}>
                <div style={{display:"flex",gap:4}}>
                  {[0,1,2].map(i=>(
                    <div key={i} style={{width:6,height:6,borderRadius:"50%",background:C.primary,animation:`pulse 1.2s ease-in-out ${i*0.2}s infinite`}}/>
                  ))}
                </div>
              </div>
            </div>
          )}
          {error&&<div style={{color:C.danger,fontSize:12,textAlign:"center",marginBottom:12}}>{error}</div>}
          <div ref={endRef}/>
        </div>
        <div style={{padding:"16px 20px",borderTop:`1px solid ${C.border}`,display:"flex",gap:10}}>
          <input
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&sendMessage()}
            placeholder="Ask about campaigns, forecasts, performance..."
            style={{flex:1,background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 16px",color:C.text,fontSize:13,outline:"none"}}
          />
          <button onClick={()=>sendMessage()} disabled={loading||!input.trim()} style={{
            padding:"10px 20px",borderRadius:12,background:C.primary,border:"none",
            color:"#000",fontWeight:700,fontSize:13,cursor:loading?"not-allowed":"pointer",
            opacity:loading||!input.trim()?0.5:1,transition:"opacity 0.2s",
          }}>→</button>
        </div>
      </GlassCard>
    </div>
  );
}

// ─── UPLOAD ─────────────────────────────────────────────────────────────────
function UploadModule() {
  const [dragOver,setDragOver] = useState(false);
  const [uploading,setUploading] = useState(false);
  const [progress,setProgress] = useState(0);
  const [stage,setStage] = useState("");
  const [done,setDone] = useState(false);
  const [fileName,setFileName] = useState("");
  const inputRef = useRef(null);

  const processFile = async (file) => {
    setFileName(file.name);
    setUploading(true);
    setDone(false);
    const stages=[
      [15,"Uploading file..."],[30,"Validating structure..."],
      [45,"Detecting columns & metrics..."],[60,"Cleaning & preprocessing data..."],
      [72,"Identifying KPIs & patterns..."],[84,"Building analytics engine..."],
      [93,"Generating AI insights..."],[100,"Dashboard ready!"],
    ];
    for(const [p,s] of stages){
      setStage(s);setProgress(p);
      await new Promise(r=>setTimeout(r,400+Math.random()*300));
    }
    setDone(true);setUploading(false);
  };

  const handleDrop=(e)=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files[0];if(f)processFile(f);};
  const handleInput=(e)=>{const f=e.target.files[0];if(f)processFile(f);};
  const reset=()=>{setDone(false);setProgress(0);setStage("");setFileName("");};

  return (
    <div style={{padding:28}}>
      <div style={{marginBottom:24}}>
        <div style={{fontSize:22,fontWeight:700,color:C.text,marginBottom:6}}>Data Upload & Processing</div>
        <div style={{fontSize:13,color:C.muted}}>Upload Excel or CSV · AI auto-processes and builds your dashboard</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:24}}>
        <div>
          <div
            onDragOver={e=>{e.preventDefault();setDragOver(true);}}
            onDragLeave={()=>setDragOver(false)}
            onDrop={handleDrop}
            onClick={()=>!uploading&&!done&&inputRef.current?.click()}
            style={{
              border:`2px dashed ${dragOver?C.primary:done?C.success:C.border}`,
              borderRadius:20,padding:"60px 40px",textAlign:"center",
              cursor:uploading||done?"default":"pointer",
              background:dragOver?`${C.primary}08`:done?`${C.success}08`:C.bgCard,
              transition:"all 0.25s",marginBottom:20,
            }}
          >
            <input ref={inputRef} type="file" accept=".xlsx,.csv,.xls" onChange={handleInput} style={{display:"none"}}/>
            {!uploading&&!done&&(
              <>
                <div style={{fontSize:48,marginBottom:16}}>⊕</div>
                <div style={{fontSize:18,fontWeight:600,color:C.text,marginBottom:8}}>Drop your file here</div>
                <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Excel (.xlsx) or CSV files supported</div>
                <button style={{padding:"10px 28px",background:C.primary,border:"none",borderRadius:10,color:"#000",fontWeight:700,fontSize:13,cursor:"pointer"}}>Browse Files</button>
              </>
            )}
            {uploading&&(
              <div>
                <div style={{fontSize:14,fontWeight:600,color:C.primary,marginBottom:8}}>{fileName}</div>
                <div style={{fontSize:13,color:C.muted,marginBottom:20}}>✦ {stage}</div>
                <div style={{height:6,background:C.border,borderRadius:3,overflow:"hidden",marginBottom:12,maxWidth:400,margin:"0 auto 12px"}}>
                  <div style={{height:"100%",width:`${progress}%`,background:`linear-gradient(90deg, ${C.primary}, ${C.secondary})`,borderRadius:3,transition:"width 0.4s ease"}}/>
                </div>
                <div style={{fontSize:28,fontWeight:700,color:C.primary}}>{progress}%</div>
              </div>
            )}
            {done&&(
              <div>
                <div style={{fontSize:48,marginBottom:12}}>✓</div>
                <div style={{fontSize:18,fontWeight:600,color:C.success,marginBottom:8}}>Analysis Complete!</div>
                <div style={{fontSize:13,color:C.muted,marginBottom:20}}>{fileName} · Dashboard updated with your data</div>
                <button onClick={reset} style={{padding:"10px 28px",background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontWeight:600,fontSize:13,cursor:"pointer"}}>Upload Another File</button>
              </div>
            )}
          </div>
          {done&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
              {[
                {icon:"◈",label:"Columns Detected",value:"24",  color:C.primary},
                {icon:"◇",label:"Rows Processed",  value:"3,482",color:C.success},
                {icon:"◉",label:"KPIs Identified", value:"18",  color:C.gold},
              ].map((s,i)=>(
                <GlassCard key={i} style={{padding:18,textAlign:"center"}}>
                  <div style={{fontSize:20,color:s.color,marginBottom:6}}>{s.icon}</div>
                  <div style={{fontSize:20,fontWeight:700,color:s.color}}>{s.value}</div>
                  <div style={{fontSize:11,color:C.muted}}>{s.label}</div>
                </GlassCard>
              ))}
            </div>
          )}
        </div>
        <div>
          <GlassCard style={{padding:22,marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:16}}>Supported Formats</div>
            {[
              {fmt:".xlsx",desc:"Excel Workbook",   color:C.success},
              {fmt:".xls", desc:"Excel 97-2003",    color:C.success},
              {fmt:".csv", desc:"Comma Separated",  color:C.primary},
            ].map((f,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                <span style={{fontSize:12,fontWeight:700,padding:"3px 8px",borderRadius:6,background:`${f.color}20`,color:f.color}}>{f.fmt}</span>
                <span style={{fontSize:12,color:C.muted}}>{f.desc}</span>
              </div>
            ))}
          </GlassCard>
          <GlassCard style={{padding:22}}>
            <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:14}}>AI Processing Pipeline</div>
            {["Upload → Validate","Parse → Detect Columns","Clean → Preprocess","Identify KPIs","Build Analytics","Generate Insights","Update Dashboard"].map((step,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <div style={{width:20,height:20,borderRadius:"50%",background:`${C.primary}20`,border:`1px solid ${C.primary}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:C.primary,flexShrink:0}}>{i+1}</div>
                <span style={{fontSize:12,color:C.muted}}>{step}</span>
              </div>
            ))}
          </GlassCard>
        </div>
      </div>
    </div>
  );
}

// ─── ROOT APP ───────────────────────────────────────────────────────────────
function App() {
  const [showLanding,setShowLanding] = useState(true);
  const [activeModule,setActiveModule] = useState("home");

  if(showLanding) return <LandingPage onEnter={()=>setShowLanding(false)}/>;

  const modules = {
    home:        <OverviewModule/>,
    marketing:   <MarketingModule/>,
    financial:   <FinancialModule/>,
    realestate:  <RealEstateModule/>,
    forecasting: <ForecastingModule/>,
    copilot:     <CopilotModule/>,
    upload:      <UploadModule/>,
  };

  return (
    <div style={{fontFamily:"'DM Sans', system-ui, sans-serif",background:C.bg,minHeight:"100vh",color:C.text}}>
      <SidebarNav active={activeModule} setActive={setActiveModule}/>
      <div style={{marginLeft:220}}>
        <Header activeModule={activeModule}/>
        <div style={{overflowY:"auto"}}>
          {modules[activeModule] || <OverviewModule/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
